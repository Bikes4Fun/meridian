# Railway config: API + webapp + chatapp (all-in-one)
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "RAILPACK"
buildCommand = "cd src && python build_all.py"
watchPatterns = ["/src/**"]

[deploy]
startCommand = "python -m src.apps.server seed && python -m src.apps.server"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
