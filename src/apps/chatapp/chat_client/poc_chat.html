<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat POC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; max-width: 520px; margin: 40px auto; padding: 16px; background: #f5f5f5; }
    h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
    .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input[type=text] { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { margin-top: 16px; width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .info  { background: #d1ecf1; color: #0c5460; }
    .error { background: #f8d7da; color: #721c24; }
    .ok    { background: #d4edda; color: #155724; }
    #messages { border: 1px solid #ddd; border-radius: 8px; height: 260px; overflow-y: auto; padding: 12px; background: #fafafa; }
    #messages p { margin: 6px 0; font-size: 14px; line-height: 1.4; }
    .msg-self  { font-weight: bold; color: #1a4a1a; }
    .msg-other { color: #333; }
    #sendRow { display: flex; gap: 8px; margin-top: 10px; }
    #msgInput { flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    #sendBtn  { margin-top: 0; width: auto; padding: 9px 20px; }
    #chatSection { display: none; }
  </style>
</head>
<body>

<!-- STEP 1: Login -->
<div class="card" id="loginSection">
  <h2>🔑 Step 1 — Log in</h2>
  <p style="font-size:13px;color:#666;margin-top:4px;">
    Open this page in <strong>two different browser windows</strong> and log in as two different users.
  </p>

  <label>Chatapp URL (where this page is served from)</label>
  <input type="text" id="apiUrl" value="http://localhost:3001" placeholder="http://localhost:3001">

  <label>User ID</label>
  <input type="text" id="userId" placeholder="e.g. fm_care_001">

  <label>Family Circle ID</label>
  <input type="text" id="familyId" placeholder="e.g. F00000">

  <label>Recipient Sendbird ID (optional; if empty, uses default Deanna)</label>
  <input type="text" id="recipientId" placeholder="e.g. dtzecha or testpatient">

  <label>Recipient name (optional; for display only)</label>
  <input type="text" id="recipientName" placeholder="e.g. Dylan or Marian">

  <button id="loginBtn" onclick="doLogin()">Log In &amp; Connect</button>
</div>

<!-- STEP 2: Chat -->
<div class="card" id="chatSection">
  <h2 id="chatTitle">💬 Chat</h2>
  <div id="status" class="info">Connecting…</div>
  <div id="messages"></div>
  <div id="sendRow">
    <input type="text" id="msgInput" placeholder="Type a message…" disabled>
    <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
  </div>
</div>

<script type="module">
// ESM: matches chat.js Sendbird v4 API (import from +esm, not UMD)
var sb = null;
var currentChannel = null;
var mySendbirdUserId = null;
var currentRecipient = null;

function $id(id) { return document.getElementById(id); }

function setStatus(msg, cls) {
  var el = $id('status');
  el.textContent = msg;
  el.className = cls || 'info';
}

function appendMessage(text, isSelf) {
  var el = $id('messages');
  var p = document.createElement('p');
  p.textContent = text;
  p.className = isSelf ? 'msg-self' : 'msg-other';
  el.appendChild(p);
  el.scrollTop = el.scrollHeight;
}

var sdkUrl = 'https://cdn.jsdelivr.net/npm/@sendbird/chat@4/+esm';
var groupUrl = 'https://cdn.jsdelivr.net/npm/@sendbird/chat@4/groupChannel/+esm';

window.doLogin = function doLogin() {
  var apiUrl   = $id('apiUrl').value.trim().replace(/\/$/, '');
  var userId   = $id('userId').value.trim();
  var familyId = $id('familyId').value.trim();

  if (!apiUrl || !userId || !familyId) {
    alert('Please fill in all three fields.');
    return;
  }

  $id('loginBtn').disabled = true;
  $id('loginBtn').textContent = 'Logging in…';

  fetch(apiUrl + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ user_id: userId, family_circle_id: familyId })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Login failed (' + r.status + ')');
    return r.json();
  })
  .then(function() {
    $id('loginSection').style.display = 'none';
    $id('chatSection').style.display  = 'block';
    setStatus('Fetching Sendbird config…', 'info');

    var recipientId = $id('recipientId').value.trim();
    var recipientName = $id('recipientName').value.trim();
    var recipientPromise = recipientId
      ? Promise.resolve({ sendbird_user_id: recipientId, name: recipientName || recipientId })
      : fetch(apiUrl + '/api/chat/recipient', { credentials: 'include' }).then(function(r){ return r.json(); });

    return Promise.all([
      fetch(apiUrl + '/api/chat/config', { credentials: 'include' }).then(function(r){ return r.json(); }),
      fetch(apiUrl + '/api/chat/token',  { method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include', body: '{}' }).then(function(r){ return r.json(); }),
      recipientPromise
    ]);
  })
  .then(function(results) {
    var config = results[0];
    var tokenData = results[1];
    var recipient = results[2];

    if (!config.app_id) throw new Error('No app_id from /api/chat/config');
    if (!tokenData.session_token) throw new Error('No session_token: ' + (tokenData.error || JSON.stringify(tokenData)));
    if (!recipient.sendbird_user_id) throw new Error('No recipient: ' + (recipient.error || JSON.stringify(recipient)));

    currentRecipient = recipient;
    mySendbirdUserId = tokenData.sendbird_user_id;
    $id('chatTitle').textContent = 'You: ' + (tokenData.display_name || mySendbirdUserId) + '  →  ' + (recipient.name || recipient.sendbird_user_id);

    setStatus('Connecting to Sendbird…', 'info');

    return import(sdkUrl).then(function(chatMod) {
      return import(groupUrl).then(function(groupMod) {
        var SendbirdChat = chatMod.default;
        sb = SendbirdChat.init({
          appId: config.app_id,
          modules: [new groupMod.GroupChannelModule()]
        });
        return sb.connect(mySendbirdUserId, tokenData.session_token);
      });
    });
  })
  .then(function() {
    setStatus('Creating / joining channel…', 'info');

    var channelBody = currentRecipient && currentRecipient.sendbird_user_id
      ? JSON.stringify({ recipient_sendbird_user_id: currentRecipient.sendbird_user_id })
      : '{}';
    return fetch(apiUrl + '/api/chat/channel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: channelBody
    }).then(function(r) { return r.json(); });
  })
  .then(function(channelData) {
    if (!channelData.channel_url) throw new Error('No channel_url: ' + JSON.stringify(channelData));

    return sb.groupChannel.getChannel(channelData.channel_url);
  })
  .then(function(channel) {
    currentChannel = channel;

    return import(groupUrl).then(function(groupMod) {
      try {
        var HandlerClass = groupMod.GroupChannelHandler;
        if (HandlerClass) {
          var handler = new HandlerClass({
            onMessageReceived: function(ch, msg) {
              if (ch.url !== currentChannel.url) return;
              var sender = (msg.sender && msg.sender.userId) || '?';
              if (sender === mySendbirdUserId) return;
              appendMessage((msg.sender && msg.sender.nickname || sender) + ': ' + msg.message, false);
            }
          });
          sb.groupChannel.addGroupChannelHandler('poc-handler', handler);
        }
      } catch (handlerErr) {
        console.warn('Real-time handler failed (non-fatal):', handlerErr);
      }
      var query = channel.createPreviousMessageListQuery ? channel.createPreviousMessageListQuery({ limit: 50 }) : null;
      if (query && query.load) return query.load();
      return [];
    });
  })
  .then(function(list) {
    var messages = Array.isArray(list) ? list : (list && list.messages ? list.messages : []);
    for (var i = 0; i < messages.length; i++) {
      var m = messages[i];
      var sender = (m.sender && m.sender.nickname) ? m.sender.nickname : ((m.sender && m.sender.userId) || '?');
      var isSelf = m.sender && m.sender.userId === mySendbirdUserId;
      appendMessage(sender + ': ' + (m.message || ''), isSelf);
    }

    setStatus('Connected. Say hello!', 'ok');
    $id('msgInput').disabled = false;
    $id('sendBtn').disabled  = false;
    $id('msgInput').focus();

    $id('msgInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  })
  .catch(function(err) {
    setStatus('Error: ' + (err && err.message ? err.message : String(err)), 'error');
    console.error('Chat POC error:', err);
    $id('loginBtn').disabled = false;
    $id('loginBtn').textContent = 'Log In & Connect';
  });
};

window.sendMessage = function sendMessage() {
  var input = $id('msgInput');
  var text  = input.value.trim();
  if (!text || !currentChannel) return;

  $id('sendBtn').disabled = true;
  currentChannel.sendUserMessage({ message: text })
    .onSucceeded(function() {
      appendMessage('You: ' + text, true);
      input.value = '';
    })
    .onFailed(function(err) {
      setStatus('Send failed: ' + (err && err.message || err), 'error');
    })
    .finally(function() { $id('sendBtn').disabled = false; });
};
</script>
</body>
</html>
