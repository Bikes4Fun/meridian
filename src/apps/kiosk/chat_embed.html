<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f5f5f5; }
        .header { display: flex; align-items: center; padding: 12px 16px; background: #fff; border-bottom: 1px solid #eee; }
        .header .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ddd; margin-right: 12px; }
        .header .info { flex: 1; }
        .header .name { font-weight: 600; font-size: 16px; color: #111; }
        .header .status { font-size: 13px; color: #666; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .bubble.out { align-self: flex-start; background: #007AFF; color: #fff; border-bottom-left-radius: 4px; }
        .bubble.in { align-self: flex-end; background: #e9e9eb; color: #111; border-bottom-right-radius: 4px; }
        .bubble .time { font-size: 11px; opacity: 0.8; margin-top: 4px; }
        .input-row { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #eee; }
        .input-row input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 15px; outline: none; }
        .input-row input:focus { border-color: #007AFF; }
        .input-row button { padding: 12px 20px; background: #007AFF; color: #fff; border: none; border-radius: 20px; font-size: 15px; cursor: pointer; }
        .input-row button:disabled { background: #ccc; cursor: not-allowed; }
        .error { padding: 12px; background: #fee; color: #c00; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar"></div>
        <div class="info">
            <div class="name" id="recipientName">Messaging with …</div>
            <div class="status" id="status">Connecting…</div>
            <div id="loggedInAs" style="font-size: 12px; color: #888; margin-top: 4px;">Logged in messaging as …</div>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-row" id="inputRow" style="display: none;">
        <input type="text" id="msgInput" placeholder="Type a message here">
        <button type="button" id="sendBtn">Send</button>
    </div>
    <div id="error" class="error" style="display: none;"></div>
    <script>
(function () {
    'use strict';
    var API_URL = '__API_URL__';
    if (!API_URL.startsWith('http')) API_URL = '';

    var q = {};
    (window.location.search || '').replace(/^\?/, '').split('&').forEach(function (p) {
        var kv = p.split('=');
        if (kv.length >= 2) q[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1].replace(/\+/g, ' '));
    });
    var recipientSb = (q.sendbird_user_id || '').trim();
    var recipientName = (q.display_name || '').trim() || 'Contact';

    var messagesEl = document.getElementById('messages');
    var msgInput = document.getElementById('msgInput');
    var sendBtn = document.getElementById('sendBtn');
    var inputRow = document.getElementById('inputRow');
    var statusEl = document.getElementById('status');
    var recipientNameEl = document.getElementById('recipientName');
    var errorEl = document.getElementById('error');

    document.getElementById('recipientName').textContent = 'Messaging with ' + recipientName;

    function log(msg, data) {
        console.log('[chat] ' + msg, data !== undefined ? data : '');
    }
    function logErr(msg, err) {
        console.error('[chat] ' + msg, err !== undefined ? err : '');
    }
    function showError(msg) {
        logErr('showError', msg);
        errorEl.textContent = msg || 'Error';
        errorEl.style.display = 'block';
        inputRow.style.display = 'flex';
    }

    function appendBubble(text, isSelf, ts) {
        var div = document.createElement('div');
        div.className = 'bubble ' + (isSelf ? 'out' : 'in');
        div.innerHTML = (text || '') + '<div class="time">' + (ts || '') + '</div>';
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(t) { if (statusEl) statusEl.textContent = t || ''; }

    if (!recipientSb) {
        showError('Missing sendbird_user_id');
        setStatus('Error');
        return;
    }

    function loadConfig() {
        return fetch(API_URL + '/api/chat/config', { credentials: 'include' }).then(function (r) {
            if (!r.ok) { logErr('Config failed', r.status); throw new Error('Config failed'); }
            return r.json();
        });
    }
    function loadToken() {
        return fetch(API_URL + '/api/chat/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({})
        }).then(function (r) {
            if (!r.ok) return r.json().then(function (d) { logErr('Token failed', d); throw new Error(d.error || 'Token failed'); });
            return r.json();
        });
    }

    var sb = null;
    var currentChannel = null;

    Promise.all([loadConfig(), loadToken()])
        .then(function (results) {
            log('config and token loaded');
            var config = results[0];
            var tokenData = results[1];
            var loggedInEl = document.getElementById('loggedInAs');
            if (loggedInEl) loggedInEl.textContent = 'Logged in messaging as ' + (tokenData.display_name || tokenData.sendbird_user_id || '…');
            if (!config.app_id || !tokenData.sendbird_user_id || !tokenData.session_token) {
                throw new Error('Missing config');
            }
            var sdkUrl = 'https://cdn.jsdelivr.net/npm/@sendbird/chat@4/+esm';
            var groupUrl = 'https://cdn.jsdelivr.net/npm/@sendbird/chat@4/groupChannel/+esm';
            return import(sdkUrl).then(function (chatMod) {
                return import(groupUrl).then(function (groupMod) {
                    sb = chatMod.default.init({
                        appId: config.app_id,
                        modules: [new groupMod.GroupChannelModule()],
                        localCacheEnabled: false
                    });
                    var connectionHandler = new chatMod.ConnectionHandler({
                        onConnected: function (userId) { log('ConnectionHandler: connected', userId); },
                        onDisconnected: function (userId) { log('ConnectionHandler: disconnected', userId); },
                        onReconnectStarted: function () { log('ConnectionHandler: reconnect started'); },
                        onReconnectSucceeded: function () { log('ConnectionHandler: reconnect succeeded'); },
                        onReconnectFailed: function () { logErr('ConnectionHandler: reconnect failed'); },
                        onConnectionLost: function () { logErr('ConnectionHandler: connection lost'); }
                    });
                    sb.addConnectionHandler('meridian-chat', connectionHandler);
                    return sb.connect(tokenData.sendbird_user_id, tokenData.session_token);
                });
            });
        })
        .then(function () {
            log('Sendbird connected');
            setStatus('Opening chat…');
            return sb.groupChannel.createChannel({
                invitedUserIds: [recipientSb],
                isDistinct: true,
                name: 'Family'
            });
        })
        .then(function (channel) {
            currentChannel = channel;
            log('Channel ready', channel.url || channel.channelUrl);
            setStatus('1:1 chat');
            inputRow.style.display = 'flex';
            sendBtn.onclick = sendMessage;
            msgInput.onkeydown = function (e) { if (e.key === 'Enter') sendMessage(); };
            var query = channel.createPreviousMessageListQuery ? channel.createPreviousMessageListQuery({ limit: 50 }) : null;
            if (query && query.load) {
                return query.load().then(function (list) {
                    var msgs = Array.isArray(list) ? list : [];
                    for (var i = 0; i < msgs.length; i++) {
                        var m = msgs[i];
                        var txt = (m.message || '').trim();
                        if (!txt) continue;
                        var isSelf = m.sender && m.sender.userId === sb.currentUser.userId;
                        var ts = m.createdAt ? new Date(m.createdAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';
                        appendBubble(txt, isSelf, ts);
                    }
                }).catch(function (loadErr) {
                    logErr('Load messages failed (send still works)', loadErr);
                    setStatus('Loaded with errors. You can still send.');
                });
            }
            return Promise.resolve();
        })
        .catch(function (err) {
            logErr('Channel error', err);
            showError('Channel error: ' + (err && err.message ? err.message : String(err)));
            setStatus('Error');
        });

    function sendMessage() {
        var text = (msgInput && msgInput.value || '').trim();
        if (!text || !currentChannel) return;
        sendBtn.disabled = true;
        currentChannel.sendUserMessage({ message: text })
            .onSucceeded(function (m) {
                log('Message sent');
                var ts = m.createdAt ? new Date(m.createdAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';
                appendBubble(text, true, ts);
                if (msgInput) msgInput.value = '';
            })
            .onFailed(function (err) {
                logErr('Send failed', err);
                showError('Send failed: ' + (err && err.message ? err.message : err));
            })
            .finally(function () { sendBtn.disabled = false; });
    }
})();
    </script>
</body>
</html>
