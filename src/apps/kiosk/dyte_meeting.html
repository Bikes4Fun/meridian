<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Video call</title>
<script type="module">
import { defineCustomElements } from 'https://cdn.jsdelivr.net/npm/@dytesdk/ui-kit@latest/loader/index.es2017.js';
defineCustomElements();
</script>
<script src="https://cdn.dyte.in/core/dyte.js"></script>
</head>
<body style="margin:0;background:#1a1a1a;color:#fff;font-family:Arial;">
<div id="dyte-meeting" style="width:100%;height:100vh;"></div>
<script>
window.addEventListener('DOMContentLoaded', function() {
  var token = __DYTE_AUTH_TOKEN__;
  if (!token) { document.body.innerHTML = '<p>No token.</p>'; return; }
  if (typeof DyteClient === 'undefined') { document.body.innerHTML = '<p>Dyte not loaded.</p>'; return; }
  DyteClient.init({ authToken: token, defaults: { audio: true, video: true } })
    .then(function(meeting) {
      var el = document.getElementById('dyte-meeting');
      if (el) el.meeting = meeting;
    })
    .catch(function(e) { document.body.innerHTML = '<p>Failed: ' + String(e) + '</p>'; });
});
</script>
</body></html>
