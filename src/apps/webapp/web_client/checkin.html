<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Check-In</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #333; }
        select, input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #chatSection { text-align: left; margin-bottom: 24px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; background: #fafafa; }
        #chatSection h2 { font-size: 16px; color: #333; margin: 0 0 8px 0; }
        #chatMessages { border: 1px solid #ddd; border-radius: 6px; height: 160px; overflow-y: auto; padding: 10px; margin: 8px 0; background: #fff; font-size: 14px; }
        #chatMessages .out { color: #007AFF; font-weight: 500; }
        #chatMessages .in { color: #333; }
        #chatSendRow { display: flex; gap: 8px; align-items: center; }
        #chatSendRow input, #chatSendRow button { width: auto; margin: 0; }
        #chatMsgInput { flex: 1; min-width: 120px; padding: 10px 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; }
        #chatMsgInput::placeholder { color: #999; }
        #chatSendBtn { flex-shrink: 0; padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        #chatStatus { font-size: 13px; color: #666; margin-top: 4px; }
        #status {
            margin-top: 20px;
        }
        #status div {
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div id="chatSection">
        <h2>Chat</h2>
        <p id="chatLoggedIn" style="font-size: 13px; color: #666; margin: 0 0 4px 0;">Logged in messaging as …</p>
        <p id="chatMessagingWith" style="font-size: 13px; color: #666; margin: 0 0 8px 0;">Messaging with …</p>
        <div id="chatMessages"></div>
        <div id="chatSendRow">
            <input type="text" id="chatMsgInput" placeholder="Type a message…">
            <button type="button" id="chatSendBtn">Send</button>
        </div>
        <div id="chatStatus" class="info">Loading…</div>
    </div>

    <h1>📍 Family Check-In</h1>
    
    <select id="familyMemberSelect">
        <option value="">-- Select who to log in --</option>
    </select>
    
    <input type="text" id="notes" placeholder="Details / Notes (optional, e.g. note for family)">
    
    <button id="checkinBtn" type="button">Check In Now</button>

    <hr style="margin: 25px 0; border: none; border-top: 1px solid #ddd;">
    <h2 style="color: #333; font-size: 20px;">Alert TV</h2>
    <p style="color: #666; font-size: 14px;">Force the TV to show the emergency screen with flashing border.</p>
    <button id="alertBtn" type="button" style="background: #e74c3c;">Alert Mode</button>
    <button id="cancelAlertBtn" type="button" style="background: #95a5a6; margin-top: 5px;">Cancel Alert</button>

    <div id="status"></div>

    <script src="chat.js"></script>
    <script src="checkin.js"></script>
</body>
</html>
