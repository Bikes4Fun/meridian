<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat POC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; max-width: 520px; margin: 40px auto; padding: 16px; background: #f5f5f5; }
    h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
    .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input[type=text] { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { margin-top: 16px; width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .info  { background: #d1ecf1; color: #0c5460; }
    .error { background: #f8d7da; color: #721c24; }
    .ok    { background: #d4edda; color: #155724; }
    #messages { border: 1px solid #ddd; border-radius: 8px; height: 260px; overflow-y: auto; padding: 12px; background: #fafafa; }
    #messages p { margin: 6px 0; font-size: 14px; line-height: 1.4; }
    .msg-self  { font-weight: bold; color: #1a4a1a; }
    .msg-other { color: #333; }
    #sendRow { display: flex; gap: 8px; margin-top: 10px; }
    #msgInput { flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    #sendBtn  { margin-top: 0; width: auto; padding: 9px 20px; }
    #chatSection { display: none; }
  </style>
</head>
<body>

<!-- STEP 1: Login -->
<div class="card" id="loginSection">
  <h2>🔑 Step 1 — Log in</h2>
  <p style="font-size:13px;color:#666;margin-top:4px;">
    Open this page in <strong>two different browser windows</strong> and log in as two different users.
  </p>

  <label>Chatapp URL (where this page is served from)</label>
  <input type="text" id="apiUrl" placeholder="e.g. http://127.0.0.1:3001">

  <label>User ID</label>
  <input type="text" id="userId" placeholder="e.g. fm_care_001">

  <label>Family Circle ID</label>
  <input type="text" id="familyId" placeholder="e.g. F00000">

  <label>Recipient Sendbird ID (required)</label>
  <input type="text" id="recipientId" placeholder="e.g. dtzecha or testpatient">

  <label>Recipient name (optional; for display only)</label>
  <input type="text" id="recipientName" placeholder="e.g. Dylan or Marian">

  <button id="loginBtn" onclick="doLogin()">Log In &amp; Connect</button>
</div>

<!-- STEP 2: Chat -->
<div class="card" id="chatSection">
  <h2 id="chatTitle">💬 Chat</h2>
  <div id="status" class="info">Connecting…</div>
  <div id="messages"></div>
  <div id="sendRow">
    <input type="text" id="msgInput" placeholder="Type a message…" disabled>
    <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
  </div>
</div>

<script type="module">
// Proxy approach: no Sendbird SDK. Uses /api/chat/send and /api/chat/messages.
var channelUrl = null;
var mySendbirdUserId = null;
var apiUrl = null;
var pollInterval = null;
var seenMessageIds = {};

function $id(id) { return document.getElementById(id); }

function setStatus(msg, cls) {
  var el = $id('status');
  el.textContent = msg;
  el.className = cls || 'info';
}

function appendMessage(text, isSelf) {
  var el = $id('messages');
  var p = document.createElement('p');
  p.textContent = text;
  p.className = isSelf ? 'msg-self' : 'msg-other';
  el.appendChild(p);
  el.scrollTop = el.scrollHeight;
}

function renderMessages(messages) {
  var list = Array.isArray(messages) ? messages : (messages && messages.messages ? messages.messages : []);
  for (var i = 0; i < list.length; i++) {
    var m = list[i];
    var mid = m.message_id || m.id;
    if (mid && seenMessageIds[mid]) continue;
    if (mid) seenMessageIds[mid] = true;
    var sender = (m.user && (m.user.nickname || m.user.user_id)) || (m.sender && (m.sender.nickname || m.sender.userId)) || '?';
    var uid = (m.user && m.user.user_id) || (m.sender && m.sender.userId);
    var text = m.message || '';
    if (!text && m.type === 'MESG') continue;
    appendMessage(sender + ': ' + text, uid === mySendbirdUserId);
  }
}

function pollMessages() {
  if (!channelUrl || !apiUrl) return;
  fetch(apiUrl + '/api/chat/messages?channel_url=' + encodeURIComponent(channelUrl), { credentials: 'include' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) return;
      renderMessages(data.messages || data);
    })
    .catch(function() {});
}

window.doLogin = function doLogin() {
  apiUrl = ($id('apiUrl').value.trim() || window.location.origin).replace(/\/$/, '');
  var userId = $id('userId').value.trim();
  var familyId = $id('familyId').value.trim();

  if (!apiUrl || !userId || !familyId) {
    alert('Please fill in API URL, User ID, and Family Circle ID.');
    return;
  }
  if (!$id('recipientId').value.trim()) {
    alert('Recipient Sendbird ID required.');
    return;
  }

  $id('loginBtn').disabled = true;
  $id('loginBtn').textContent = 'Logging in…';

  fetch(apiUrl + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ user_id: userId, family_circle_id: familyId })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Login failed (' + r.status + ')');
    return r.json();
  })
  .then(function() {
    $id('loginSection').style.display = 'none';
    var chatEl = $id('chatSection');
    chatEl.style.display = 'block';
    chatEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setStatus('Fetching token…', 'info');

    var recipientId = $id('recipientId').value.trim();
    var recipientName = $id('recipientName').value.trim();
    if (!recipientId) {
      $id('loginBtn').disabled = false;
      $id('loginBtn').textContent = 'Log In & Connect';
      $id('loginSection').style.display = 'block';
      $id('chatSection').style.display = 'none';
      throw new Error('Recipient Sendbird ID required.');
    }
    var recipient = { sendbird_user_id: recipientId, name: recipientName || recipientId };

    return fetch(apiUrl + '/api/chat/token', { method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include', body: '{}' })
      .then(function(r) { return r.json(); })
      .then(function(tokenData) {
        if (!tokenData.session_token) {
          var msg = tokenData.error ? (tokenData.detail ? tokenData.error + ': ' + tokenData.detail : tokenData.error) : 'No session_token';
          throw new Error(msg);
        }
        mySendbirdUserId = tokenData.sendbird_user_id;
        $id('chatTitle').textContent = 'You: ' + (tokenData.display_name || mySendbirdUserId) + '  →  ' + (recipient.name || recipient.sendbird_user_id);
        setStatus('Creating channel…', 'info');
        return fetch(apiUrl + '/api/chat/channel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ recipient_sendbird_user_id: recipient.sendbird_user_id })
        });
      });
  })
  .then(function(r) {
    return r.text().then(function(txt) {
      var data;
      try { data = txt ? JSON.parse(txt) : null; } catch (_) { data = null; }
      if (!r.ok) {
        var msg = (data && data.error) ? data.error : (txt || 'Channel failed').slice(0, 200);
        if (r.status === 401) msg = 'Not logged in. Please log in again.';
        throw new Error(msg);
      }
      return data;
    });
  })
  .then(function(channelData) {
    if (!channelData.channel_url) throw new Error('No channel_url');
    channelUrl = channelData.channel_url;
    setStatus('Loading messages…', 'info');
    return fetch(apiUrl + '/api/chat/messages?channel_url=' + encodeURIComponent(channelUrl), { credentials: 'include' }).then(function(r) { return r.json(); });
  })
  .then(function(data) {
    if (data.error) throw new Error(data.error + (data.detail ? ': ' + data.detail : ''));
    renderMessages(data.messages || data);
    setStatus('Connected. Say hello!', 'ok');
    $id('msgInput').disabled = false;
    $id('sendBtn').disabled = false;
    $id('msgInput').focus();
    $id('msgInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
    pollInterval = setInterval(pollMessages, 2500);
  })
  .catch(function(err) {
    var msg = (err && err.message) ? err.message : String(err);
    setStatus('Error: ' + msg, 'error');
    console.error('Chat POC error:', err);
    $id('loginBtn').disabled = false;
    $id('loginBtn').textContent = 'Log In & Connect';
  });
};

window.sendMessage = function sendMessage() {
  var input = $id('msgInput');
  var text = input.value.trim();
  if (!text || !channelUrl || !apiUrl) return;

  $id('sendBtn').disabled = true;
  fetch(apiUrl + '/api/chat/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ channel_url: channelUrl, message: text })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.detail || data.error);
    appendMessage('You: ' + text, true);
    input.value = '';
  })
  .catch(function(err) {
    setStatus('Send failed: ' + (err && err.message || err), 'error');
  })
  .finally(function() { $id('sendBtn').disabled = false; });
};
</script>
</body>
</html>
